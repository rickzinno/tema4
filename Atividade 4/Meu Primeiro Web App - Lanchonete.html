<!DOCTYPE html>
<!-- saved from url=(0047)https://almeida-cma.github.io/FP_T04/teste.html -->
<html lang="pt-BR">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Primeiro Web App - Lanchonete</title>
    <style>
        /* CSS: Aqui definimos a APARÊNCIA (O Estilo) */
        :root {
            --primary: #ffffff8e;
            /* Cor de "Lanche" */
            --dark: #867d86;
            --light: #ecf0f1;
            --success: #000000;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* Container Principal Responsivo */
        .app-container {
            width: 90%;
            max-width: 400px;
            background: rgb(90, 85, 89);
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 2px solid #ddd;
        }

        /* Cabeçalho do App */
        .header {
            background-color: var(--primary);
            color: rgb(0, 0, 0);
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .header p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        /* "Tela" do Sistema - Onde a lógica aparece */
        #tela-saida {
            background-color: rgb(90, 90, 90);
            color: #ffffff;
            /* Cor clássica de terminal */
            padding: 15px;
            height: 150px;
            font-family: monospace;
            font-size: 0.9rem;
            overflow-y: auto;
            border-bottom: 2px solid #333;
        }

        /* Área de Interação */
        .controles {
            padding: 20px;
        }

        .input-grupo {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        input {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            background-color: var(--success);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Rodapé com o Total */
        .footer-total {
            background: #eee;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--dark);
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="header">
            <h1>Meu perfil</h1>
            <p>Essa é minha primeira tentativa de perfil⚡</p>
        </div>

        <!-- Esta div funciona como o "escreva" do Portugol -->
        <div id="tela-saida">
            Bem-vindo!<br>
            1 - Quem sou eu ?<br>
            2 - Por que faço programação ?<br>
            3 - O que eu gosto ?<br>
            4 - Feche se não tem duvidas!<br>
            --------------------<br>
            Digite o número da opção:
        </div>

        <div class="controles">
            <div class="input-grupo">
                <input type="number" id="inputOpcao" placeholder="Ex: 1" min="1" max="4">
                <button onclick="executarLogica()">Confirmar </button>
            </div>
        </div>

        <div class="footer-total" id="exibirTotal">
            Homem aranha é o melhor heroi.
        </div>
    </div>

    <script>
        /* JAVASCRIPT: Aqui entra a LÓGICA (O Cérebro) */

        // 1. Variáveis Globais (Igual no Portugol)
        let total = 0.0;
        const tela = document.getElementById("tela-saida");
        const displayTotal = document.getElementById("exibirTotal");

        function executarLogica() {
            // Pegamos o valor do input (Igual ao 'leia' do Portugol)
            const input = document.getElementById("inputOpcao");
            let opcao = parseInt(input.value);

            // 2. A Estrutura de Decisão (Igual ao Escolha-Caso)
            switch (opcao) {
                case 1:
                    total;
                    imprimirNaTela(" Meu nome é gustavo tenho 15 anos, estou no 2 ano do ensino medio, curso t.i e não tenho amigos");
                    break;

                case 2:
                    total;
                    imprimirNaTela("Gosto de tecnologia e quero trabalhar sem sair de casa");
                    break;

                case 3:
                    total;
                    imprimirNaTela("Gosto do homem aranha, praia, montanhas e gosto de acampar");
                    break;

                case 4:
                    imprimirNaTela("Esse sou eu, espero que não tenha te decepcionado");
                    alert("Pedido Finalizado! Valor Total: R$ " + total.toFixed(2));
                    // Opcional: reiniciar o sistema
                    // total = 0;
                    break;

                default:
                    imprimirNaTela("❌ OPÇÃO INVÁLIDA! Escolha 1, 2, 3 ou 4.");
            }

            // Atualiza o valor no rodapé (Visual)
            displayTotal.innerText = "Total: R$ " + total.toFixed(2);

            // Limpa o campo para a próxima jogada
            input.value = "";
            input.focus();
        }

        // Função auxiliar para "escrever" na nossa tela preta
        function imprimirNaTela(texto) {
            tela.innerHTML += "<br>" + texto;
            // Faz o scroll automático para o final da tela
            tela.scrollTop = tela.scrollHeight;
        }

        // Atalho: apertar ENTER também funciona
        document.getElementById("inputOpcao").addEventListener("keypress", function (e) {
            if (e.key === "Enter") executarLogica();
        });
    </script>

</body>

</html>
